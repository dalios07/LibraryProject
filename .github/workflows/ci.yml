name: My First CI

on:
  pull_request:

jobs:

  test-job:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Version Java avant setup-java
        run: java -version

      - name: Configurer Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compiler le backend
        run: mvn clean compile
        working-directory: ProjectBackend/demo

      - name: Exécuter les tests
        run: mvn test
        working-directory: ProjectBackend/demo